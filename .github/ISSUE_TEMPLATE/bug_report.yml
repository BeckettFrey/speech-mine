name: Bug Report
description: Something isn't working right
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Keep it brief — the essentials are enough.

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g. macOS 14.5, Ubuntu 22.04, Windows 11"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python Version
      placeholder: "e.g. 3.11.9"
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Affected Module
      options:
        - extract
        - format
        - chunk
        - search
        - CLI / general
        - not sure
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you run, and what went wrong?
      placeholder: |
        Command:
        uv run speech-mine extract ...

        Error or unexpected output:
        ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: I expected the transcript to be written to output.csv
    validations:
      required: true

  - type: textarea
    id: extras
    attributes:
      label: Anything else?
      description: Relevant audio format, num-speakers, compute-type, stack trace snippet, etc.
